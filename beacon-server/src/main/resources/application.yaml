spring:
  application:
    # 应用名称
    name: beacon-server
  # 激活配置文件
  profiles:
    active: local
  main:
    # 允许循环依赖，因为项目是三层架构，无法避免这个情况。
    allow-circular-references: true
  # Servlet 配置
  servlet:
    # 文件上传相关配置项
    multipart:
      # 单个文件大小
      max-file-size: 16MB
      # 设置总上传的文件大小
      max-request-size: 32MB
  mvc:
    pathmatch:
      # 解决 SpringFox 与 SpringBoot 2.6.x 不兼容的问题，参见 SpringFoxHandlerProviderBeanPostProcessor 类
      matching-strategy: ANT_PATH_MATCHER

  # Jackson 配置项
  jackson:
    serialization:
      write-dates-as-timestamps: true # 设置 Date 的格式，使用时间戳
      write-date-timestamps-as-nanoseconds: false # 设置不使用 nanoseconds 的格式。例如说 1611460870.401，而是直接 1611460870401
      write-durations-as-timestamps: true # 设置 Duration 的格式，使用时间戳
      fail-on-empty-beans: false # 允许序列化无属性的 Bean

  # Cache 配置项
  cache:
    type: REDIS
    redis:
      time-to-live: 1h # 设置过期时间为 1 小时



# 工作流 Flowable 配置
flowable:
  # 1. false: 默认值，Flowable 启动时，对比数据库表中保存的版本，如果不匹配。将抛出异常
  # 2. true: 启动时会对数据库中所有表进行更新操作，如果表存在，不做处理，反之，自动创建表
  # 3. create_drop: 启动时自动创建表，关闭时自动删除表
  # 4. drop_create: 启动时，删除旧表，再创建新表
  database-schema-update: true # 设置为 false，可通过 https://github.com/flowable/flowable-sql 初始化
  db-history-used: true # flowable6 默认 true 生成信息表，无需手动设置
  check-process-definitions: false # 设置为 false，禁用 /resources/processes 自动部署 BPMN XML 流程
  history-level: full # full：保存历史数据的最高级别，可保存全部流程相关细节，包括流程流转各节点参数

# MyBatis Plus 的配置项
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true # 虽然默认为 true ，但是还是显示去指定下。
  global-config:
    db-config:
#      id-type: NONE # “智能”模式，基于 IdTypeEnvironmentPostProcessor + 数据源的类型，自动适配成 AUTO、INPUT 模式。
#      id-type: AUTO # 自增 ID，适合 MySQL 等直接自增的数据库
#      id-type: INPUT # 用户输入 ID，适合 Oracle、PostgreSQL、Kingbase、DB2、H2 数据库
      id-type: ASSIGN_ID # 分配 ID，默认使用雪花算法。
      logic-delete-value: 1 # 逻辑已删除值(默认为 1)
      logic-not-delete-value: 0 # 逻辑未删除值(默认为 0)
  # 在mapper.xml文件中可以不屑权限
  type-aliases-package: ${framework.info.base-package}.business.*.dal.dataobject
  encryptor:
    password: XDV71a+xqStEA3WH # 加解密的秘钥，可使用 https://www.imaegoo.com/2020/aes-key-generator/ 网站生成
    slip-offset: 10

#################### 开发脚手架相关配置 ####################
framework:
  info:
    version: 1.0.0
    # spring bean 扫描路径
    base-package: com.beacon
  web:
    admin-api:
      controller: "**.controller.admin.**"
      prefix: "/admin-api"
  swagger:
    title: Beacon Boot
    description: 项目包含管理系统常用功能，项目文档见：https://www.yuque.com/beacon-cao/open-beacon
    version: ${framework.info.version}
    email: 1533928999@qq.com
    author: Beacon
  captcha:
    # 验证码的开关
    enable: true
  codegen:
    base-package: ${framework.info.base-package}
    db-schemas: ${spring.datasource.dynamic.datasource.master.name}
  security:
    #无需登录的接口
    permit-all-urls:
      # 验证码相关路
      - /captcha/get
      - /captcha/check
#################### 验证码相关配置 ####################
# 更多关于验证码的配置项可查看官方文档 https://ajcaptcha.beliefteam.cn/captcha-doc/
aj:
  captcha:
    jigsaw: classpath:images/jigsaw # 滑动验证，底图路径，不配置将使用默认图片；以 classpath: 开头，取 resource 目录下路径
    pic-click: classpath:images/pic-click # 滑动验证，底图路径，不配置将使用默认图片；以 classpath: 开头，取 resource 目录下路径
    cache-type: redis # 缓存 local/redis...
    cache-number: 1 # local 缓存的阈值,达到这个值，清除缓存
    timing-clear: 180 # local定时清除过期缓存(单位秒),设置为0代表不执行
    # 验证码类型 如需修改类型，前端代码需要同步修改。  default两种都实例化。 blockPuzzle 滑块拼图 clickWord 文字点选
    type: blockPuzzle
    # 右下角图片水印，可使用 https://tool.chinaz.com/tools/unicode.aspx 中文转 Unicode，Linux 可能需要转 unicode
    water-mark: Open-Beacon
    # 接口请求次数一分钟限制是否开启 true|false
    req-frequency-limit-enable: false
    # 验证失败 5 次，get接口锁定
    req-get-lock-limit: 5
    # 验证失败后，锁定时间间隔
    req-get-lock-seconds: 10
    # get 接口一分钟内请求数限制
    req-get-minute-limit: 30
    # check 接口一分钟内请求数限制
    req-check-minute-limit: 60
    # verify 接口一分钟内请求数限制
    req-verify-minute-limit: 60
    slip-offset: 15
#
management:
  endpoint:
    health:
      # 开启健康检查详细信息
      show-details: always